<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="cadastrar.css">
</head>
<style>
    body {

        margin: 0;
        padding: 0;
        min-width: 100vh;
        display: flex;
        justify-content: center;
        padding: 250px;
        background-size: cover; 

        background-image: url('https://t2.tudocdn.net/587154?w=1920');

    }

    .input_usuario {

        border: none;
        border-radius: 10px;
        padding: 10px;
        margin: 5px;
        border-radius: 10px;
        width: 450px;

    }

    .input_senha {

        border: none;
        border-radius: 10px;
        padding: 10px;
        margin: 5px;
        border-radius: 10px;
        width: 450px;

    }

    .botao_cadastro {

        border: none;
        padding: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 25px;
        color: rgb(255, 255, 255);
        background-color: rgba(0, 0, 255, 0.466);
        border-radius: 10px;
        width: 200px;

    }
    .botao_login {

        border: none;
        padding: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 15px;
        color: rgb(255, 255, 255);
        background-color: rgba(0, 0, 255, 0.466);
        border-radius: 10px;
        width: 200px;

    }

    .botao_login:hover {
        transform: scale(1.1);
        background-color: rgb(1, 1, 206);
    }
    .botao_cadastro:hover {
        transform: scale(1.1);
        background-color: rgb(1, 1, 206);
    }

    .input__cadastro {
        background-color: rgba(61, 61, 61, 0.644);
        padding: 30px;
        flex-direction: column;
        margin: 20px;
        border-radius: 15px;

    }

    div {
        background-color: rgb(0, 0, 0);
        width: 500px;
        
    }

    h1 {
        color: rgb(255, 255, 255);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;

    }

</style>

<body>

    <form action="/usuario/cadastro" method="post">

        <div class="input__cadastro">

            <h1>
                Usuário
            </h1>

            <input name="input_usuario" class="input_usuario" type="text" placeholder="seugmail@gmail.com">

            <h1>
                Senha
            </h1>

            <input name="input_senha" class="input_senha" type="password" placeholder="Digite sua senha aqui">

            <button type="submit" class="botao_cadastro" name="button__input_cadastrar"> Cadastrar </button>
            <button type="submit" class="botao_login" name="button__input_login"> Login </button>

        </div>
    </form>

</body>

</html>
